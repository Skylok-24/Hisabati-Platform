version: "3.9"

services:
  redis:
    image: redis:7
    container_name: trust_redis

  web:
    build: .
    container_name: trust_backend
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - .:/app:Z
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis