version: "3.9"

services:
  db:
    image: postgres:15
    container_name: trust_db
    restart: always
    environment:
      POSTGRES_DB: trusthandel
      POSTGRES_USER: lokman
      POSTGRES_PASSWORD: 1234
    

  redis:
    image: redis:7
    container_name: trust_redis
    

  web:
    build: .
    container_name: trust_backend
    command: >
      sh -c "
      sleep 5 &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - .:/app:Z
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis