version: "3.9"

services:

  redis:
    image: redis:7
    container_name: trust_redis
    restart: always

  web:
    build: .
    container_name: trust_backend
    command: >
      sh -c "
      python manage.py migrate &&
      gunicorn trusthandle.wsgi:application --bind 0.0.0.0:8000 --workers 3
      "
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis